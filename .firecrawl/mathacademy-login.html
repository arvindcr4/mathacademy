<!DOCTYPE html><html>    
    <body>
        <div id="wrap">
            <link rel="stylesheet" href="https://www.mathacademy.com/css/login.css" type="text/css" media="screen">



<div id="logoFrame" style="margin-top: 50px;">
    <a href="https://www.mathacademy.com/" tabindex="-1"><img src="https://www.mathacademy.com/img/math-academy-400.png"></a>    
</div>        

<form method="post" action="https://www.mathacademy.com/login">
    <div id="errorMessage">
        
    </div>
    
    <div id="usernameOrEmailFrame">
        <input id="usernameOrEmail" name="usernameOrEmail" type="text" placeholder="Username or Email" value="">
    </div>
        
    <div id="passwordFrame">
        <input id="password" name="password" type="password" placeholder="Password" value="">
        <a href="https://www.mathacademy.com/forgot-password" tabindex="-1" class="forgotLink">Forgot?</a>                    
    </div>
    
    <div id="buttonBar">
        <input type="submit" id="loginButton" name="submit" value="LOGIN">
        <a id="signUpButton" href="https://www.mathacademy.com/sign-up">JOIN BETA</a>
    </div>    
</form>


        </div>
    
                      

    
</body></html>
