appId: com.learnnova.app
productName: LearnNova
copyright: Copyright © 2026 LearnNova

directories:
  output: dist-electron

files:
  - electron/**/*
  - out/**/*
  - package.json

mac:
  category: public.app-category.education
  target:
    - dmg
    - zip

win:
  target:
    - nsis
    - portable

linux:
  category: Education
  target:
    - AppImage
    - deb

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
